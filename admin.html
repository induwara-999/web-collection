<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0f0c29; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: auto; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card i { font-size: 2rem; color: #00d4ff; }
        .user-item { background: rgba(255,255,255,0.03); padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-left: 5px solid #ffcc00; }
        .user-item.approved { border-left-color: #00ff88; }
        .user-item.admin-exclusive { border-left-color: #00d4ff; background: rgba(0, 212, 255, 0.05); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .badge.admin { background: #00d4ff; color: #000; }
        .btn { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-approve { background: #00ff88; margin-right: 5px; }
        .btn-reject { background: #ff4b2b; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-size: 1.5rem; color: #00d4ff; font-weight: 600;">ADMIN PANEL</div>
            <button class="btn btn-reject" onclick="logout()">Logout</button>
        </header>
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><h3 id="totalUsers">0</h3><p>Total Users</p></div>
            <div class="stat-card"><i class="fas fa-user-clock"></i><h3 id="pendingUsers">0</h3><p>Pending</p></div>
            <div class="stat-card"><i class="fas fa-user-check"></i><h3 id="approvedUsers">0</h3><p>Approved</p></div>
        </div>
        <div id="userDisplay"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkdgID-HPsHajqzjutwPup7Q-FfLqYqQw",
            authDomain: "source-code-library-f9552.firebaseapp.com",
            databaseURL: "https://source-code-library-f9552-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "source-code-library-f9552",
            storageBucket: "source-code-library-f9552.firebasestorage.app",
            messagingSenderId: "735357035791",
            appId: "1:735357035791:web:199e063c065bfe68b74a7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };

        onValue(ref(db, 'users'), (snapshot) => {
            const display = document.getElementById('userDisplay');
            display.innerHTML = "";
            let t=0, p=0, a=0;
            snapshot.forEach(child => {
                t++; const u = child.val(); const id = child.key;
                const isAdmin = u.email === "dinethinduwara999@gmail.com";
                if(u.status === 'approved' || isAdmin) a++; else p++;

                const el = document.createElement('div');
                el.className = `user-item ${u.status === 'approved' || isAdmin ? 'approved' : ''} ${isAdmin ? 'admin-exclusive' : ''}`;
                el.innerHTML = `
                    <div><h4>${u.username} ${isAdmin ? '<span class="badge admin">ADMIN</span>' : ''}</h4><p>${u.email}</p></div>
                    <div>${!isAdmin ? `
                        ${u.status === 'pending' ? `<button class="btn btn-approve" onclick="manage('${id}','approve')">Approve</button>` : ''}
                        <button class="btn btn-reject" onclick="manage('${id}','delete')">Delete</button>
                    ` : '<span class="badge admin">SYSTEM OWNER</span>'}</div>`;
                display.appendChild(el);
            });
            document.getElementById('totalUsers').innerText = t;
            document.getElementById('pendingUsers').innerText = p;
            document.getElementById('approvedUsers').innerText = a;
        });

        window.manage = (id, act) => {
            if(act === 'approve') update(ref(db, 'users/'+id), {status:'approved'});
            else if(confirm("Delete user?")) remove(ref(db, 'users/'+id));
        };
    </script>
</body>
</html>
