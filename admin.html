<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: white; min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1200px; margin: auto; animation: fadeIn 1s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .logo { font-size: 1.5rem; font-weight: 600; color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            text-align: center; transition: 0.3s; animation: slideUp 0.5s ease-out;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: #00d4ff; }
        .stat-card i { font-size: 2rem; margin-bottom: 10px; color: #00d4ff; }
        .stat-card h3 { font-size: 2.5rem; margin: 10px 0; }
        .stat-card p { opacity: 0.7; font-size: 0.9rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .section-title { margin-bottom: 20px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: #00d4ff; }
        .user-list { display: grid; gap: 15px; }
        .user-item {
            background: rgba(255, 255, 255, 0.03); padding: 15px 25px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid #ffcc00; transition: 0.3s;
        }
        .user-item.approved { border-left-color: #00ff88; }
        .user-item.admin-exclusive { border-left-color: #00d4ff; background: rgba(0, 212, 255, 0.05); }
        .user-info h4 { margin-bottom: 5px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; margin-left: 10px; }
        .badge.pending { background: #ffcc00; color: #000; }
        .badge.approved { background: #00ff88; color: #000; }
        .badge.admin { background: #00d4ff; color: #000; }
        .actions { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .btn-approve { background: #00ff88; color: #000; }
        .btn-reject { background: #ff4b2b; color: #fff; }
        @media (max-width: 600px) { .user-item { flex-direction: column; text-align: center; gap: 15px; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo"><i class="fas fa-shield-halved"></i> ADMIN INDUWARA </div>
            <button class="btn btn-reject" onclick="location.href='index.html'"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><h3 id="totalUsers">0</h3><p>Total Registered Users</p></div>
            <div class="stat-card"><i class="fas fa-user-clock"></i><h3 id="pendingUsers">0</h3><p>Pending Approvals</p></div>
            <div class="stat-card"><i class="fas fa-user-check"></i><h3 id="approvedUsers">0</h3><p>Approved Users</p></div>
        </div>

        <div class="section-title"><i class="fas fa-list"></i> User Management Portal</div>
        <div id="userDisplay" class="user-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkdgID-HPsHajqzjutwPup7Q-FfLqYqQw",
            authDomain: "source-code-library-f9552.firebaseapp.com",
            databaseURL: "https://source-code-library-f9552-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "source-code-library-f9552",
            storageBucket: "source-code-library-f9552.firebasestorage.app",
            messagingSenderId: "735357035791",
            appId: "1:735357035791:web:199e063c065bfe68b74a7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const userDisplay = document.getElementById('userDisplay');
        const totalCount = document.getElementById('totalUsers');
        const pendingCount = document.getElementById('pendingUsers');
        const approvedCount = document.getElementById('approvedUsers');

        onValue(ref(db, 'users'), (snapshot) => {
            userDisplay.innerHTML = "";
            let total = 0, pending = 0, approved = 0;

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    total++;
                    const user = childSnapshot.val();
                    const userId = childSnapshot.key;
                    const isAdmin = user.email === "dinethinduwara999@gmail.com";
                    
                    const isApproved = user.status === "approved";
                    if(isApproved || isAdmin) approved++; else pending++;

                    const userEl = document.createElement('div');
                    userEl.className = `user-item ${isApproved || isAdmin ? 'approved' : ''} ${isAdmin ? 'admin-exclusive' : ''}`;
                    
                    // Logic to hide buttons for main Admin
                    let actionHtml = '';
                    if (!isAdmin) {
                        actionHtml = `
                            <div class="actions">
                                ${!isApproved ? `<button class="btn btn-approve" onclick="manageUser('${userId}', 'approve')"><i class="fas fa-check"></i> Approve</button>` : ''}
                                <button class="btn btn-reject" onclick="manageUser('${userId}', 'delete')"><i class="fas fa-trash-can"></i> ${isApproved ? 'Delete' : 'Reject'}</button>
                            </div>`;
                    } else {
                        actionHtml = `<div class="actions"><span class="badge admin"><i class="fas fa-star"></i> Primary Admin</span></div>`;
                    }

                    userEl.innerHTML = `
                        <div class="user-info">
                            <h4>${user.username} ${isAdmin ? '<span class="badge admin">ADMIN</span>' : `<span class="badge ${user.status}">${user.status}</span>`}</h4>
                            <p><i class="fas fa-envelope"></i> ${user.email}</p>
                        </div>
                        ${actionHtml}
                    `;
                    userDisplay.appendChild(userEl);
                });
            }
            totalCount.innerText = total;
            pendingCount.innerText = pending;
            approvedCount.innerText = approved;
        });

        window.manageUser = (id, action) => {
            if(action === 'approve') {
                update(ref(db, 'users/' + id), { status: 'approved' });
            } else {
                if(confirm("Are you sure you want to remove this user?")) {
                    remove(ref(db, 'users/' + id));
                }
            }
        };
    </script>
</body>
</html>
